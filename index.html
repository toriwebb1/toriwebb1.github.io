
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tori webb</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: default;
    }

    /* ── BACKGROUND SIZZLE REEL ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .bg-slide.on { opacity: 0.72; }
    .bg-slide > * {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Mindful Spending brand animation — recreated as a reel slide */
    .brand-scene {
      display: flex; align-items: center; justify-content: center; text-align: center;
      background:
        radial-gradient(58% 50% at 82% 6%, rgba(62,158,126,0.34), transparent 60%),
        radial-gradient(52% 46% at 6% 0%, rgba(224,83,60,0.30), transparent 60%),
        radial-gradient(60% 65% at 55% 108%, rgba(61,127,194,0.32), transparent 60%),
        #0d0e11;
    }
    .brand-scene .brand-tag {
      padding: 0 1.2rem;
      font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; line-height: 1.12;
      font-size: clamp(1.9rem, 5.4vw, 4rem); letter-spacing: 0.01em;
      background: linear-gradient(100deg, #E0533C, #3E9E7E, #3D7FC2);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      opacity: 0; animation: brandTagIn 3.4s cubic-bezier(.2,.75,.3,1) both;
    }
    @keyframes brandTagIn {
      0%   { opacity: 0; transform: scale(0.96) translateY(10px); }
      26%  { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* readability gradient over the reel */
    #bg-scrim {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.66) 36%, rgba(0,0,0,0.3) 70%, rgba(0,0,0,0.14) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 28%, rgba(0,0,0,0) 74%, rgba(0,0,0,0.5) 100%);
    }

    /* ── smiley cursor ── */
    #cursor-smiley {
      position: fixed; z-index: 9999; pointer-events: none;
      width: 26px; height: 26px;
      transform: translate(-50%, -50%);
      visibility: hidden;
    }
    #cursor-smiley svg { width: 100%; height: 100%; }
    body.cursor-active { cursor: none; }

    /* ── INTRO COPY (typed) ── */
    #stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 clamp(2rem, 9vw, 7rem);
      opacity: 0; transition: opacity 0.8s ease;
    }
    #stage.visible { opacity: 1; }

    .intro-copy {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 300;
      color: #fff;
      text-align: left;
      max-width: min(960px, 92vw);
    }
    .intro-copy .line { font-weight: 300; }
    /* first line — styled like the project-page titles */
    .intro-copy .line.lead {
      font-size: clamp(3rem, 6.1vw, 5rem);
      font-weight: 400;
      text-transform: uppercase;
      line-height: 1.0; letter-spacing: 0.04em;
      margin-bottom: 0.3em;
      color: #fff;
    }
    /* second line — styled like the first-paragraph (lead) description on project pages */
    .intro-copy .line.sub {
      font-weight: 400;
      font-size: clamp(1.78rem, 3.3vw, 2.8rem);
      line-height: 1.4; letter-spacing: 0.01em;
      text-transform: none;
      color: rgba(240, 236, 228, 0.8); margin-bottom: 0.6em;
    }
    .intro-copy .line.body {
      font-size: clamp(1.25rem, 2.3vw, 1.75rem);
      font-weight: 300;
      line-height: 1.45; letter-spacing: 0.04em;
      color: #d6d2c8;
    }
    /* last line — styled like the site header nav links (lowercase, thin, wide tracking) */
    .intro-copy .line.menu {
      font-size: clamp(0.95rem, 1.55vw, 1.12rem);
      font-weight: 300; text-transform: none;
      letter-spacing: 0.16em; line-height: 1.6;
      margin-top: 0.95em; color: #d6d2c8;
    }
    /* rotating role word — vertical flip, not retype */
    .intro-copy .rotor {
      display: inline-block; overflow: hidden;
      height: 1.15em; line-height: 1.15em;
      vertical-align: -0.22em;
    }
    .intro-copy .rotor__inner {
      display: inline-block;
      will-change: transform, opacity;
    }
    .intro-copy em {
      font-style: italic;
      font-weight: 300;
    }
    .intro-link {
      color: #f472b6;
      text-decoration: none;
      border-bottom: 1px solid rgba(244,114,182,0.55);
      transition: color 0.25s ease, border-color 0.25s ease;
      white-space: nowrap;
    }
    .intro-link:hover { color: #fff; border-bottom-color: #fff; }

    .type-caret {
      display: inline-block;
      width: 0.5ch; height: 1em;
      background: #f472b6;
      margin-left: 2px;
      transform: translateY(0.14em);
      animation: caretBlink 1s steps(1) infinite;
    }
    @keyframes caretBlink { 50% { opacity: 0; } }

    /* ── phones: keep each intro line on ONE line (no wrapping) ── */
    @media (max-width: 600px) {
      #stage { padding: 0 0.8rem 0 2rem; }
      .intro-copy { max-width: 96vw; }
      .intro-copy .line { white-space: nowrap; }
      .intro-copy .line.lead { font-size: 8vw; letter-spacing: 0.04em; }
      .intro-copy .line.sub  { font-size: 5vw; letter-spacing: 0.01em; margin-bottom: 0.55em; }
      .intro-copy .line.menu { font-size: 3.3vw; letter-spacing: 0.16em; margin-top: 0.85em; }
    }
  </style>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>

  <!-- BACKGROUND SIZZLE REEL -->
  <div id="bg-layer">
    <div class="bg-slide"></div>
    <div class="bg-slide"></div>
  </div>
  <div id="bg-scrim"></div>

  <!-- smiley cursor -->
  <div id="cursor-smiley">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" fill="#f472b6" stroke="#000" stroke-width="5"/>
      <ellipse cx="36" cy="40" rx="7" ry="10" fill="#000"/>
      <ellipse cx="64" cy="40" rx="7" ry="10" fill="#000"/>
      <path d="M18 58 Q50 99 82 58" stroke="#000" stroke-width="4" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <!-- INTRO COPY -->
  <div id="stage">
    <div class="intro-copy" id="intro-copy"></div>
  </div>

  <script>
    /* ════════════════════════════════════════════════
       BACKGROUND SIZZLE REEL — randomized images + video
       crossfading slideshow (only ~2 media loaded at once)
       ════════════════════════════════════════════════ */
    const REEL_DIR = 'sizzle reel/';
    const REEL_FILES = [
      '1.jpg','2.mp4','3.jpg','4.jpg','5.jpg','6.jpg','7.jpg','8.JPG','9.jpg','10.mp4',
      '11.mp4','12.jpg','13.jpeg','14.jpg','15.jpg','16.JPG','18.jpg','19.jpeg','20.jpg',
      '21.mp4','22.jpg','23.jpg','24.JPG','25.jpg','26.jpg','27.jpg','28.jpg',
      '31.jpg','32.JPG'
    ];
    const isVideo = f => /\.(mp4|webm|mov)$/i.test(f);

    // build + Fisher–Yates shuffle for a random order each load
    const MEDIA = REEL_FILES.map(f => ({ src: encodeURI(REEL_DIR + f), type: isVideo(f) ? 'video' : 'image' }));
    // Mindful Spending brand animation (recreated in CSS, not a file) joins the rotation
    MEDIA.push({ src: 'brand', type: 'brand' });
    for (let i = MEDIA.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [MEDIA[i], MEDIA[j]] = [MEDIA[j], MEDIA[i]];
    }
    // always lead with 27.jpg, then the shuffled remainder
    const firstSrc = encodeURI(REEL_DIR + '27.jpg');
    const fi = MEDIA.findIndex(m => m.src === firstSrc);
    if (fi > 0) { const [first] = MEDIA.splice(fi, 1); MEDIA.unshift(first); }

    const IMG_HOLD = 2600;            // ms an image stays before advancing
    const slides = [...document.querySelectorAll('.bg-slide')];
    let curLayer = 0;                 // index of the currently visible slide
    let mIdx = 0;                     // pointer into MEDIA

    function buildMediaEl(item) {
      let el;
      if (item.type === 'brand') {
        el = document.createElement('div');
        el.className = 'brand-scene';
        el.innerHTML = '<span class="brand-tag">A budgeting app,<br>made for your needs</span>';
      } else if (item.type === 'video') {
        el = document.createElement('video');
        el.muted = true; el.defaultMuted = true; el.loop = true;
        el.playsInline = true; el.setAttribute('playsinline', '');
        el.setAttribute('preload', 'auto');
        el.src = item.src;
      } else {
        el = document.createElement('img');
        el.alt = '';
        el.src = item.src;
      }
      return el;
    }

    function showNext() {
      const item = MEDIA[mIdx % MEDIA.length];
      mIdx++;

      const incoming = slides[curLayer ^ 1];
      const outgoing = slides[curLayer];
      const el = buildMediaEl(item);
      incoming.innerHTML = '';
      incoming.appendChild(el);

      let advanced = false;
      const advance = () => { if (!advanced) { advanced = true; showNext(); } };

      const reveal = () => {
        incoming.classList.add('on');
        outgoing.classList.remove('on');
        curLayer ^= 1;
        setTimeout(() => { outgoing.innerHTML = ''; }, 2500); // free memory after fade
      };

      if (item.type === 'brand') {
        // CSS animation slide — reveal immediately, hold long enough for the tagline to bloom in
        reveal();
        setTimeout(advance, 4200);
      } else if (item.type === 'video') {
        // videos hold for the same time as photos — long clips get cropped, short clips loop
        el.addEventListener('loadeddata', () => { reveal(); el.play().catch(() => {}); setTimeout(advance, IMG_HOLD); }, { once: true });
        el.addEventListener('error', advance, { once: true });
        setTimeout(advance, 9000); // safety: never stall if a clip won't load
      } else {
        const go = () => { reveal(); setTimeout(advance, IMG_HOLD); };
        if (el.complete) {
          // already resolved: show if it loaded, otherwise skip a deleted/broken file
          el.naturalWidth ? go() : advance();
        } else {
          el.addEventListener('load', go, { once: true });
          el.addEventListener('error', advance, { once: true }); // missing file → skip to next
          setTimeout(advance, 9000); // safety: never stall on a slow/missing file
        }
      }
    }

    showNext();

    /* ════════════════════════════════════════════════
       SMILEY CURSOR
       ════════════════════════════════════════════════ */
    const smiley = document.getElementById('cursor-smiley');
    document.body.classList.add('cursor-active');
    let moved = false;
    document.addEventListener('mousemove', e => {
      smiley.style.left = e.clientX + 'px';
      smiley.style.top  = e.clientY + 'px';
      if (!moved) { moved = true; smiley.style.visibility = 'visible'; }
    });

    /* ════════════════════════════════════════════════
       TYPED INTRO
       ════════════════════════════════════════════════ */
    // "designer" rotates through these
    const ROLES = ['designer','photographer','traveler','cat lover','friend','daughter','animal lover'];

    const LINES = [
      { cls: 'lead', segs: [ { t: "Hello! I’m tori." } ] },
      { cls: 'sub',  segs: [ { t: "And I’m a " }, { t: ROLES[0], rotor: true } ] },
      { cls: 'menu', fast: true, segs: [
        { t: 'My work', href: '../projects/index.html' },
        { t: '. ', pink: true },
        { t: 'About me', href: '../about/index.html' },
        { t: '. ', pink: true },
        { t: 'Contact', href: '../contact/index.html' },
        { t: '.', pink: true }
      ] }
    ];

    const TYPE_MS = 34;       // base per-char speed (slightly quicker)
    const TYPE_JITTER = 50;   // random extra per char — variance makes it feel human
    const LINE_PAUSE = 580;   // pause after each line break

    function typeIntro() {
      const copyEl = document.getElementById('intro-copy');
      const caret = document.createElement('span');
      caret.className = 'type-caret';
      let rotorNode = null, rotorInner = null;

      let li = 0;
      function nextLine() {
        if (li >= LINES.length) {
          if (caret) caret.remove();   // typing is done — drop the cursor
          // a quick slot-machine through a few words, then continuous rotation from the next word
          setTimeout(() => slotMachine(rotorInner, 0, 4, endIdx =>
            startRotator(rotorNode, rotorInner, null, endIdx)), 450);
          return;
        }
        const lineData = LINES[li++];
        const lineEl = document.createElement('div');
        lineEl.className = 'line ' + lineData.cls;
        copyEl.appendChild(lineEl);
        lineEl.appendChild(caret); // caret lives in (and is sized by) the active line

        // per-line typing speed (the last row types faster)
        const baseMs = lineData.fast ? 16 : TYPE_MS;
        const jitMs  = lineData.fast ? 22 : TYPE_JITTER;
        const punct  = lineData.fast ? 90 : 280;
        const spacePause = lineData.fast ? 24 : 55;
        let lineHasRotor = false;

        let si = 0;
        function nextSeg() {
          if (si >= lineData.segs.length) {
            // just move to the next line — the slot-machine runs once ALL lines are typed
            setTimeout(nextLine, LINE_PAUSE);
            return;
          }
          const seg = lineData.segs[si++];
          let node, target;
          if (seg.rotor) {
            node = document.createElement('span'); node.className = 'rotor';
            target = document.createElement('span'); target.className = 'rotor__inner';
            node.appendChild(target);
            rotorNode = node; rotorInner = target; lineHasRotor = true;
          } else if (seg.href) {
            node = document.createElement('a'); node.className = 'intro-link'; node.href = seg.href; target = node;
          } else if (seg.em) {
            node = document.createElement('em'); target = node;
          } else if (seg.ital) {
            node = document.createElement('span'); node.style.fontStyle = 'italic'; target = node;
          } else {
            node = document.createElement('span'); target = node;
            if (seg.pink) node.style.color = '#f472b6';
          }
          lineEl.insertBefore(node, caret);

          let ci = 0;
          (function typeChar() {
            const ch = seg.t.charAt(ci);            // the character being revealed
            target.textContent = seg.t.slice(0, ++ci);
            if (ci < seg.t.length) {
              let delay = baseMs + Math.random() * jitMs;
              if (/[.,!?;:]/.test(ch)) delay += punct; // linger after punctuation
              else if (ch === ' ') delay += spacePause; // small breath at spaces
              setTimeout(typeChar, delay);
            } else {
              setTimeout(nextSeg, lineData.fast ? 70 : 130);
            }
          })();
        }
        nextSeg();
      }
      nextLine();
    }

    // slot-machine: the SAME vertical scroll used to switch words, but ripping
    // through every role fast, then decelerating and settling on the first one
    function slotMachine(inner, startIndex, count, done) {
      if (!inner) { done(startIndex); return; }
      inner.style.opacity = '1';
      const DUR = 150;              // per-word slide — legible; only a few words so it's quick overall
      let i = startIndex, n = 0;

      function step() {
        n++;
        const last = n >= count;
        // linear = constant-velocity reel (no per-word pause); ease-out only on the final settle
        const dur  = last ? 280 : DUR;
        const ease = last ? 'cubic-bezier(.2,.75,.3,1)' : 'linear';
        // current word scrolls up and out the top
        inner.style.transition = `transform ${dur}ms ${ease}`;
        inner.style.transform = 'translateY(-110%)';
        setTimeout(() => {
          // next word enters from below; the final one settles back on the start word (designer)
          i = last ? startIndex : (i + 1) % ROLES.length;
          inner.textContent = ROLES[i];
          inner.style.transition = 'none';
          inner.style.transform = 'translateY(110%)';
          void inner.offsetWidth; // reflow
          inner.style.transition = `transform ${dur}ms ${ease}`;
          inner.style.transform = 'translateY(0)';
          if (last) { setTimeout(() => done(i), 300); return; }   // report where it landed
          setTimeout(step, dur);   // continuous — next word starts the instant this one lands
        }, dur);
      }
      step();
    }

    // gently flip/scroll the role word up and bring the next one in from below
    function startRotator(rotorNode, inner, caret, startIndex) {
      if (caret) caret.remove(); // typing is done — drop the cursor
      if (!inner) return;
      let ri = startIndex || 0;
      const HOLD = 2200, DUR = 460, EASE = 'cubic-bezier(.6,0,.2,1)';

      function cycle() {
        setTimeout(() => {
          // current word slides up and out
          inner.style.transition = `transform ${DUR}ms ${EASE}, opacity ${DUR}ms ease`;
          inner.style.transform = 'translateY(-115%)';
          inner.style.opacity = '0';
          setTimeout(() => {
            // swap text while hidden, reposition below, then slide into place
            ri = (ri + 1) % ROLES.length;
            inner.textContent = ROLES[ri];
            inner.style.transition = 'none';
            inner.style.transform = 'translateY(115%)';
            inner.style.opacity = '0';
            void inner.offsetWidth; // reflow so the next transition runs
            inner.style.transition = `transform ${DUR}ms ${EASE}, opacity ${DUR}ms ease`;
            inner.style.transform = 'translateY(0)';
            inner.style.opacity = '1';
            cycle();
          }, DUR);
        }, HOLD);
      }
      cycle();
    }

    /* ════════════════════════════════════════════════
       SEQUENCE
       ════════════════════════════════════════════════ */
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    (async function run() {
      await wait(1500);
      document.getElementById('stage').classList.add('visible');
      await wait(450);
      typeIntro();
    })();
  </script>
</body>
</html>
